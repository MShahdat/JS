<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Function</title>
</head>

<body>


  <script>

    // call() method
    function fun() {
      return 'hello ' + this.name;
    }
    const per = { name: 'rakib' }
    console.log(fun.call(per))



    const p1 = {
      fName: 'shahdat',
      lName: 'hossain'
    }
    const p2 = {
      fName: 'sheikh',
      lName: 'ridoy'
    }

    function greet(greet) {
      return greet + ' ' + this.fName;
    }
    console.log(greet.call(p1, 'hello'))


    const person = {
      fullName: function () {
        return this.fName + ' ' + this.lName;
      }
    }
    console.log(person.fullName.call(p1))


    // apply() method
    console.log(greet.apply(p1, ['hello']))
    console.log(person.fullName.apply(p1))



    console.log(Math.max(1,5,3,2))
    console.log(Math.max.apply(0, [3,5,332,1,56]))
    const ar = [1,3,4,2,43,6,54, 23]
    console.log(Math.max.apply(0, ar))






  </script>
</body>

</html>
