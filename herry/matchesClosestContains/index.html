<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matches Closest and Contains</title>
</head>
<body>
  <div>
    <p class="box" id="id1">this is element 1 
      <span id="sp1">span1
        <span id="csp1">child span</span>
      </span>
    </p>
    <p class="box" id="id2">this is element 2</p>
  </div>
  <div id="container"> 
    <p id="child">hello</p>
  </div>


  <script>
    
    // console.log(id2)
    const id1 = document.getElementById('id1')
    console.log(id1.matches('.box'))
    
    const csp1 = document.getElementById('csp1')
    let closest = (csp1.closest('.box'))
    if(closest){
      console.log('ok')
    }else{
      console.log('not')
    }

    const box = document.querySelector('.box')
    console.log(box.contains(sp1)) // true
    console.log(csp1.contains(id1)) //false


    const con = document.getElementById('container')
    const child = document.getElementById('child')
    const div = document.createElement('div')
    div.innerHTML = '<h3> new item created</h3>'

  </script>
</body>
</html>
