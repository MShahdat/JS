    function linearSearch (arr, re){
      const len = arr.length
      for (let i = 0; i < len; i++) {
        if(arr[i] == re){
          return i
        }
      }
      return 'item not found'
    }

    console.log('problem 3')

    function largeSring(arr){
      console.log(arr)
      let leng = -1
      const len = arr.length
      let count

      for (let i = 0; i < len; i++) {
        if(arr[i].length > leng){
          leng = arr[i].length
          count = i
        }
      }
      // console.log('index of : ', arr.indexOf(arr[count]))

      return {
        str : arr[count],
        idx : count
      }

    }
