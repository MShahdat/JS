<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ajax example</title>
</head>
<br>
<button id="get">get data</button><br><br>
<button id="send">send data</button>


<script>
  document.getElementById('get').addEventListener('click', getData)
  document.getElementById('send').addEventListener('click', sendData)


  function sendRequest(method, url, data) {

    const promise = new Promise((resolve, reject) => {

      const xhttp = new XMLHttpRequest()

      xhttp.onload = function () {
        // console.log(this.responseText) // when not mentioned response type
        // console.log((this.response))

        // handle application error
        if(this.status >= 400){
          reject(`there was an application error and response status ${this.status}`)
        }else{
          resolve(this.response)
        }

      }

      xhttp.onerror = function(){
        reject('There was an error!')
      }


      xhttp.open(method, url)

      xhttp.responseType = 'json'

      xhttp.send(data)
    })
    return promise
  }


  function getData() {
    console.log('get data')
    sendRequest('GET', 'https://jsonplaceholder.typicode.com/posts/1')
      .then((res) => {
        console.log(res)
      }).catch((err) => {
        console.log(err)
      })

  }


  function sendData() {
    console.log('send data')
    sendRequest('POST', 'https://jsonplaceholder.typicode.com/posts', JSON.stringify({
      title: 'foo',
      body: 'bar',
      userId: 1,
    }))
      .then((res) => {
        console.log(res)
      })
  }


</script>




</body>

</html>
